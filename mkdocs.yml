site_name: 운빨존만겜 역기획서
site_url: https://suan2z.github.io/testgit/

theme:
  name: material
  language: ko
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy

  # 🎨 컬러 테마: 다크 모드(slate) 고정 및 형광 포인트
  palette:
    scheme: slate
    primary: black      # 상단 바를 블랙으로 차분하게
    accent: teal       # 강조 색상을 형광 느낌의 Teal로

  # 폰트 설정
  font:
    text: Roboto
    code: Roboto Mono

# 🖌️ 세부 디자인을 위한 CSS 파일 연결
extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/scroll_top.js

# 메뉴 구조
nav:
  - 게임 개요: index.md
  - 게임 세부 시스템:
    - systems/overview.md
  - UI/UX: ux.md
  - 스키마 설계: schema.md
  - 필요 리소스: resources.md

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - tables