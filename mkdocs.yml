site_name: 2048 기획서
site_url: https://suan2z.github.io/2048/

theme:
  name: material
  language: ko
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy

  # 🎨 컬러 테마: 다크 모드(slate) 고정 및 형광 포인트
  palette:
    scheme: slate
    primary: teal       # 상단 바 - 다크 틸 계열
    accent: cyan        # 강조 색상 - 시안

  # 폰트 설정
  font:
    text: Roboto
    code: Roboto Mono

# 🖌️ 세부 디자인을 위한 CSS 파일 연결
extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/scroll_top.js

# 메뉴 구조
nav:
  - 게임 개요:
    - 컨셉 비교 개요: concepts/index.md
    - 안 A — 카제나 방식 × 패키지 RPG: concepts/concept_A.md
    - 안 B — 스테이지 클리어 × 덱 리셋 로그라이크: concepts/concept_B.md
    - 안 C — 2048 에너지 보드 × 덱 카드 RPG: concepts/concept_C.md
  - 레퍼런스:
    - 림버스컴퍼니: references/limbus.md
    - 카오스 제로 나이트메어: references/chaos_zero_nightmare.md
  - 게임 세부 시스템:
    - systems/overview.md
  - UI/UX: ux.md
  - 스키마 설계: schema.md
  - 필요 리소스: resources.md

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - tables